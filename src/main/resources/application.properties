app.billing.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
app.billing.stripe.price-pro-monthly=${STRIPE_PRICE_PRO_MONTHLY:}
app.billing.stripe.price-enterprise-monthly=${STRIPE_PRICE_ENTERPRISE_MONTHLY:}
app.billing.success-url=${BILLING_SUCCESS_URL:http://localhost:5173/abbonamento?checkout=success}
