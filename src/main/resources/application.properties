# =============================
# Configurazione Database
# =============================
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-eu-central-1.pooler.supabase.com:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres.ijckghwssyjhztzapdqz}
spring.datasource.password=${DB_PASSWORD:Rexton070qwer!}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool HikariCP (consigliato per Supabase free)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.max-lifetime=1800000

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=restaurant

# =============================
# Server
# =============================
server.port=8080

# =============================
# JWT
# =============================
jwt.secret=${JWT_SECRET:restaurant_hub_secret_key_change_in_production}

# =============================
# Registrazione
# =============================
# Imposta REGISTRATION_CODE come variabile d'ambiente in produzione.
# Se non impostata, la registrazione è disabilitata.
registration.code=${REGISTRATION_CODE:}


# Mail Aruba (conferma prenotazioni)
spring.mail.host=smtps.aruba.it
spring.mail.port=465
spring.mail.username=info@torrepalivacanze.it
spring.mail.password=Rexton070qwer.
spring.mail.protocol=smtps
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================
# Billing / Stripe
# =============================
